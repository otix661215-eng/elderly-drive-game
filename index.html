<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🅿️ 銀髮停車樂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2c3e50;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
    overflow: hidden;
  }
  #gameContainer {
    position: relative; width: 800px; max-width: 100vw;
    height: 600px; max-height: 100vh;
  }
  canvas { display: block; width: 100%; height: 100%; border-radius: 12px; }

  #startScreen {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #0984e3 0%, #6c5ce7 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    border-radius: 12px; z-index: 10; overflow-y: auto; padding: 20px 20px 40px;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
  }
  #startScreen h1 { font-size: 44px; color: #fff; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); margin-bottom: 4px; margin-top: 10px; }
  #startScreen .subtitle { font-size: 18px; color: #ffeaa7; margin-bottom: 16px; }
  .level-btn {
    display: flex; align-items: center; gap: 10px;
    width: 340px; max-width: 90vw; padding: 11px 15px;
    margin: 4px 0; font-size: 17px;
    border: none; border-radius: 12px;
    cursor: pointer; font-family: inherit;
    transition: transform 0.15s; color: #fff; text-align: left;
  }
  .level-btn:hover { transform: scale(1.03); }
  .level-btn:active { transform: scale(0.97); }
  .level-btn .num { font-size: 24px; flex-shrink: 0; }
  .level-btn .info { flex-grow: 1; }
  .level-btn .info .title { font-weight: bold; font-size: 17px; }
  .level-btn .info .desc { font-size: 13px; opacity: 0.85; }
  .level-btn.l1 { background: linear-gradient(135deg, #00b894, #00cec9); }
  .level-btn.l2 { background: linear-gradient(135deg, #0984e3, #74b9ff); }
  .level-btn.l3 { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
  .level-btn.l4 { background: linear-gradient(135deg, #e17055, #fdcb6e); }
  .level-btn.l5 { background: linear-gradient(135deg, #d63031, #e84393); }
  .level-btn.l6 { background: linear-gradient(135deg, #2d3436, #636e72); }
  .controls-hint { margin-top: 20px; color: #dfe6e9; font-size: 15px; text-align: center; line-height: 1.7; }

  #hud {
    position: absolute; top: 10px; left: 10px; right: 10px;
    display: none; justify-content: space-between; pointer-events: none; z-index: 5;
  }
  .hud-box { background: rgba(0,0,0,0.55); color: #fff; padding: 8px 16px; border-radius: 10px; font-size: 18px; font-weight: bold; }

  #mobileControls {
    position: absolute; bottom: 8px; left: 0; right: 0;
    display: none; justify-content: space-between; align-items: flex-end; z-index: 5;
    padding: 0 15px;
  }

  /* Steering Wheel */
  .steering-wheel {
    width: 130px; height: 130px;
    background: rgba(45,52,54,0.6);
    border: 5px solid rgba(255,255,255,0.45);
    border-radius: 50%; position: relative;
    cursor: grab; user-select: none; -webkit-user-select: none;
    backdrop-filter: blur(4px); flex-shrink: 0;
    touch-action: none;
  }
  .steering-wheel:active { cursor: grabbing; }
  .steering-wheel .wheel-inner {
    position: absolute; inset: 8px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .steering-wheel .wheel-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
  }
  .steering-wheel .wheel-spoke {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 6px; height: 90px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
  }
  .steering-wheel .wheel-handle {
    position: absolute; top: 50%; left: 50%;
    transform-origin: center;
    width: 14px; height: 14px;
    background: #ffeaa7;
    border-radius: 50%;
    margin-top: -7px; margin-left: -7px;
  }
  .steering-wheel .wheel-handle.top {
    transform: translate(0, -52px);
  }
  .steering-wheel .wheel-handle.right {
    transform: translate(52px, 0);
  }
  .steering-wheel .wheel-handle.bottom {
    transform: translate(0, 52px);
  }
  .steering-wheel .wheel-handle.left {
    transform: translate(-52px, 0);
  }

  /* Pedals */
  .pedals {
    display: flex; flex-direction: column; gap: 10px; align-items: center;
  }
  .pedal {
    width: 90px; height: 60px;
    border-radius: 14px;
    border: 3px solid rgba(255,255,255,0.4);
    color: #fff; font-size: 20px; font-weight: bold;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    backdrop-filter: blur(4px); transition: transform 0.1s, background 0.1s;
    touch-action: none;
  }
  .pedal:active { transform: scale(0.93); }
  .pedal .icon { font-size: 24px; }
  .pedal .label { font-size: 14px; margin-top: 2px; }
  .pedal.gas { background: rgba(0,184,148,0.55); }
  .pedal.gas:active { background: rgba(0,184,148,0.8); }
  .pedal.brake { background: rgba(214,48,49,0.55); }
  .pedal.brake:active { background: rgba(214,48,49,0.8); }
  .pedal.reverse { background: rgba(108,92,231,0.55); }
  .pedal.reverse:active { background: rgba(108,92,231,0.8); }

  #notification {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85); color: #ffeaa7;
    padding: 20px 40px; border-radius: 16px;
    font-size: 24px; text-align: center; display: none; z-index: 6;
    animation: fadeInOut 3s ease-in-out forwards;
  }
  @keyframes fadeInOut {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }

  #resultScreen {
    position: absolute; inset: 0; background: rgba(0,0,0,0.8);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 12px; z-index: 9;
  }
  #resultScreen h2 { font-size: 40px; margin-bottom: 10px; }
  #resultScreen .stars { font-size: 50px; margin: 10px 0 20px; }
  #resultScreen .stats { color: #dfe6e9; font-size: 18px; margin-bottom: 25px; text-align: center; line-height: 1.8; }
  #resultScreen button {
    padding: 12px 36px; font-size: 20px;
    border: none; border-radius: 12px; cursor: pointer; margin: 5px; font-family: inherit;
  }
  #retryBtn { background: #00b894; color: #fff; }
  #nextBtn { background: #6c5ce7; color: #fff; }
  #backBtn { background: #636e72; color: #fff; }

  #pauseOverlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 12px; z-index: 8;
  }
  #pauseOverlay h2 { color: #fff; font-size: 42px; margin-bottom: 20px; }
  #pauseOverlay button {
    padding: 14px 40px; font-size: 22px;
    border: none; border-radius: 12px; cursor: pointer; margin: 6px; font-family: inherit;
  }
  #resumeBtn { background: #00b894; color: #fff; }
  #quitBtn { background: #d63031; color: #fff; }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <div id="startScreen">
    <h1>🅿️ 銀髮停車樂</h1>
    <div class="subtitle">慢慢來，停好就好</div>
    <button class="level-btn l1" onclick="startLevel(0)">
      <span class="num">1️⃣</span>
      <span class="info"><div class="title">路邊停車</div><div class="desc">最基本 — 平行停入路邊車位</div></span>
    </button>
    <button class="level-btn l2" onclick="startLevel(1)">
      <span class="num">2️⃣</span>
      <span class="info"><div class="title">倒車入庫</div><div class="desc">垂直倒車停入車位</div></span>
    </button>
    <button class="level-btn l3" onclick="startLevel(2)">
      <span class="num">3️⃣</span>
      <span class="info"><div class="title">前進停車</div><div class="desc">正向開進車位</div></span>
    </button>
    <button class="level-btn l4" onclick="startLevel(3)">
      <span class="num">4️⃣</span>
      <span class="info"><div class="title">斜向停車</div><div class="desc">45度斜角停入</div></span>
    </button>
    <button class="level-btn l5" onclick="startLevel(4)">
      <span class="num">5️⃣</span>
      <span class="info"><div class="title">狹窄車位</div><div class="desc">空間很小，考驗技巧</div></span>
    </button>
    <button class="level-btn l6" onclick="startLevel(5)">
      <span class="num">6️⃣</span>
      <span class="info"><div class="title">綜合挑戰</div><div class="desc">障礙物更多的小路停車</div></span>
    </button>
    <button class="level-btn l1" onclick="startLevel(6)">
      <span class="num">7️⃣</span>
      <span class="info"><div class="title">雙排倒車</div><div class="desc">兩側都是車，倒車入庫</div></span>
    </button>
    <button class="level-btn l2" onclick="startLevel(7)">
      <span class="num">8️⃣</span>
      <span class="info"><div class="title">三角錐挑戰</div><div class="desc">三角錐圍繞的路邊停車</div></span>
    </button>
    <button class="level-btn l3" onclick="startLevel(8)">
      <span class="num">9️⃣</span>
      <span class="info"><div class="title">地下停車場</div><div class="desc">狹窄通道倒車入庫</div></span>
    </button>
    <button class="level-btn l4" onclick="startLevel(9)">
      <span class="num">🔟</span>
      <span class="info"><div class="title">反向路邊停車</div><div class="desc">從右側停入左側車位</div></span>
    </button>
    <button class="level-btn l5" onclick="startLevel(10)">
      <span class="num">1️⃣1️⃣</span>
      <span class="info"><div class="title">S型彎道停車</div><div class="desc">繞過三角錐抵達車位</div></span>
    </button>
    <button class="level-btn l6" onclick="startLevel(11)">
      <span class="num">1️⃣2️⃣</span>
      <span class="info"><div class="title">最終挑戰</div><div class="desc">所有技巧的綜合考驗</div></span>
    </button>
    <div class="controls-hint">
      ⌨️ 鍵盤：↑前進 ↓倒車 ←→ 轉向<br>
      📱 手機：左邊方向盤轉向，右邊踏板控制<br>
      🔇 撞到也沒關係，慢慢來就好！
    </div>
  </div>

  <div id="hud">
    <div class="hud-box" id="hudLevel">🅿️ 關卡 1</div>
    <div class="hud-box" id="hudTimer">⏱️ 0s</div>
    <div class="hud-box" id="hudHits">💥 0</div>
  </div>

  <div id="mobileControls">
    <!-- Steering Wheel -->
    <div class="steering-wheel" id="steeringWheel">
      <div class="wheel-inner"></div>
      <div class="wheel-spoke"></div>
      <div class="wheel-center"></div>
      <div class="wheel-handle top" id="wheelHandle"></div>
    </div>

    <!-- Pedals -->
    <div class="pedals">
      <div class="pedal gas" id="pedalGas"
        ontouchstart="mobileUp=true" ontouchend="mobileUp=false"
        onmousedown="mobileUp=true" onmouseup="mobileUp=false" onmouseleave="mobileUp=false">
        <span class="icon">⛽</span><span class="label">前進</span>
      </div>
      <div class="pedal reverse" id="pedalReverse"
        ontouchstart="mobileDown=true" ontouchend="mobileDown=false"
        onmousedown="mobileDown=true" onmouseup="mobileDown=false" onmouseleave="mobileDown=false">
        <span class="icon">⬇️</span><span class="label">倒車</span>
      </div>
    </div>
  </div>

  <div id="notification"></div>

  <div id="resultScreen">
    <h2 id="resultTitle"></h2>
    <div class="stars" id="resultStars"></div>
    <div class="stats" id="resultStats"></div>
    <div>
      <button id="retryBtn" onclick="retryLevel()">🔄 再試一次</button>
      <button id="nextBtn" onclick="nextLevel()">➡️ 下一關</button>
      <button id="backBtn" onclick="quitToMenu()">🏠 回主選單</button>
    </div>
  </div>

  <div id="pauseOverlay">
    <h2>⏸️ 暫停</h2>
    <button id="resumeBtn" onclick="resumeGame()">繼續</button>
    <button id="quitBtn" onclick="quitToMenu()">回主選單</button>
  </div>
</div>

<script>
const W = 800, H = 600;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

// Mobile state
let mobileUp=false, mobileDown=false, mobileLeft=false, mobileRight=false;

// Steering wheel state
let wheelAngle = 0; // current wheel angle in radians
let wheelTouchId = null;
let wheelTouchStartAngle = 0;
let wheelTouchStartWheel = 0;

// ====== STEERING WHEEL LOGIC ======
function initSteeringWheel() {
  const wheel = document.getElementById('steeringWheel');
  const handle = document.getElementById('wheelHandle');
  if (!wheel) return;

  function getAngleFromCenter(cx, cy, px, py) {
    return Math.atan2(py - cy, px - cx);
  }

  function updateWheelVisual() {
    if (handle) {
      // Handle starts at 12 o'clock (top), rotates with wheelAngle
      // wheelAngle=0 → top (12 o'clock), positive = clockwise
      const r = 52;
      const x = Math.sin(wheelAngle) * r;
      const y = -Math.cos(wheelAngle) * r;
      handle.style.transform = `translate(${x}px, ${y}px)`;
    }
  }

  // Touch events
  wheel.addEventListener('touchstart', e => {
    e.preventDefault();
    if (wheelTouchId !== null) return;
    const t = e.changedTouches[0];
    wheelTouchId = t.identifier;
    const rect = wheel.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    wheelTouchStartAngle = getAngleFromCenter(cx, cy, t.clientX, t.clientY);
    wheelTouchStartWheel = wheelAngle;
  }, { passive: false });

  wheel.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.identifier !== wheelTouchId) continue;
      const rect = wheel.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const currentAngle = getAngleFromCenter(cx, cy, t.clientX, t.clientY);
      let delta = currentAngle - wheelTouchStartAngle;
      // Normalize delta
      while (delta > Math.PI) delta -= Math.PI * 2;
      while (delta < -Math.PI) delta += Math.PI * 2;
      wheelAngle = wheelTouchStartWheel + delta;
      // Clamp wheel angle to ±90 degrees
      wheelAngle = Math.max(-Math.PI/2, Math.min(Math.PI/2, wheelAngle));
      updateWheelVisual();
      // Update steering state
      mobileLeft = wheelAngle < -0.15;
      mobileRight = wheelAngle > 0.15;
    }
  }, { passive: false });

  wheel.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === wheelTouchId) {
        wheelTouchId = null;
        // Auto-center the wheel
        const centerInterval = setInterval(() => {
          wheelAngle *= 0.8;
          if (Math.abs(wheelAngle) < 0.05) {
            wheelAngle = 0;
            mobileLeft = false;
            mobileRight = false;
            clearInterval(centerInterval);
          }
          updateWheelVisual();
          mobileLeft = wheelAngle < -0.15;
          mobileRight = wheelAngle > 0.15;
        }, 30);
      }
    }
  });

  // Mouse events (for desktop testing)
  let mouseDown = false;
  wheel.addEventListener('mousedown', e => {
    mouseDown = true;
    const rect = wheel.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    wheelTouchStartAngle = getAngleFromCenter(cx, cy, e.clientX, e.clientY);
    wheelTouchStartWheel = wheelAngle;
  });

  document.addEventListener('mousemove', e => {
    if (!mouseDown) return;
    const rect = wheel.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const currentAngle = getAngleFromCenter(cx, cy, e.clientX, e.clientY);
    let delta = currentAngle - wheelTouchStartAngle;
    while (delta > Math.PI) delta -= Math.PI * 2;
    while (delta < -Math.PI) delta += Math.PI * 2;
    wheelAngle = wheelTouchStartWheel + delta;
    wheelAngle = Math.max(-Math.PI/2, Math.min(Math.PI/2, wheelAngle));
    updateWheelVisual();
    mobileLeft = wheelAngle < -0.15;
    mobileRight = wheelAngle > 0.15;
  });

  document.addEventListener('mouseup', e => {
    if (!mouseDown) return;
    mouseDown = false;
    const centerInterval = setInterval(() => {
      wheelAngle *= 0.8;
      if (Math.abs(wheelAngle) < 0.05) {
        wheelAngle = 0;
        mobileLeft = false;
        mobileRight = false;
        clearInterval(centerInterval);
      }
      updateWheelVisual();
      mobileLeft = wheelAngle < -0.15;
      mobileRight = wheelAngle > 0.15;
    }, 30);
  });

  updateWheelVisual();
}

// Game state
let running=false, paused=false, frameCount=0, currentLevel=0;
let car, level, startTime, hits, parked, parkTimer;
let obstacles = [], parkingSpot, particles = [];

// ====== CAR DIMENSIONS (shared) ======
const CAR_W = 40;   // car width (short side)
const CAR_H = 70;   // car length (long side)

// ====== ANGLE SYSTEM ======
// angle = 0 → car faces UP (north), -Y direction
// angle = PI/2 → car faces RIGHT, +X direction
// angle = PI → car faces DOWN, +Y direction
// angle = -PI/2 → car faces LEFT, -X direction
//
// Movement: dx = sin(angle) * speed, dy = -cos(angle) * speed
// ↑ (forward): speed > 0 → moves in facing direction
// ↓ (reverse): speed < 0 → moves backward

// ====== CONSTANTS ======
const PI = Math.PI;
const PI2 = Math.PI / 2;
const PI4 = Math.PI / 4;

// ====== LEVELS ======
// All carStart angles use our system: 0=up, PI/2=right, PI=down, -PI/2=left
// For parallel parking (horizontal cars), targetAngle = PI/2 (facing right) or -PI/2 (facing left)
// For perpendicular parking (vertical cars), targetAngle = 0 (facing up) or PI (facing down)

const LEVELS = [
  {
    // Level 1: 路邊停車 - car drives from left, parks between two cars on the right side
    name: "路邊停車",
    desc: "平行停入路邊車位",
    carStart: { x: 150, y: 430, angle: PI2 }, // facing right, driving along road
    spot: { cx: 460, cy: 430, w: 105, h: CAR_W+10, angle: 0, type: 'parallel' },
    obstacles: [
      { cx: 330, cy: 430, w: CAR_W, h: CAR_H, angle: PI2, type: 'car', color: '#e17055' },
      { cx: 570, cy: 430, w: CAR_W, h: CAR_H, angle: PI2, type: 'car', color: '#0984e3' },
    ],
    walls: [{ x: 0, y: 520, w: W, h: 80 }],
    targetAngle: PI2, // face right
  },
  {
    // Level 2: 倒車入庫 - car faces down (away from spot), reverse UP into top spot
    name: "倒車入庫",
    desc: "垂直倒車停入車位",
    carStart: { x: 400, y: 450, angle: PI }, // facing DOWN (away from spot)
    spot: { cx: 400, cy: 140, w: CAR_W+15, h: CAR_H+10, angle: 0, type: 'perpendicular' },
    obstacles: [
      { cx: 300, cy: 140, w: CAR_W, h: CAR_H, angle: 0, type: 'car', color: '#00b894' },
      { cx: 500, cy: 140, w: CAR_W, h: CAR_H, angle: 0, type: 'car', color: '#e84393' },
    ],
    walls: [
      { x: 0, y: 0, w: W, h: 50 },
      { x: 0, y: 520, w: W, h: 80 },
    ],
    targetAngle: PI, // face down (nose points out, tail in spot)
  },
  {
    // Level 3: 前進停車 - car at bottom, drive forward into top spot
    name: "前進停車",
    desc: "正向開進車位",
    carStart: { x: 400, y: 450, angle: 0 }, // facing up
    spot: { cx: 400, cy: 140, w: CAR_W+15, h: CAR_H+10, angle: 0, type: 'forward' },
    obstacles: [
      { cx: 300, cy: 140, w: CAR_W, h: CAR_H, angle: 0, type: 'car', color: '#fdcb6e' },
      { cx: 500, cy: 140, w: CAR_W, h: CAR_H, angle: 0, type: 'car', color: '#6c5ce7' },
    ],
    walls: [
      { x: 0, y: 0, w: W, h: 50 },
      { x: 0, y: 520, w: W, h: 80 },
    ],
    targetAngle: 0, // face up (nose points into spot)
  },
  {
    // Level 4: 斜向停車 - 45 degree angle
    name: "斜向停車",
    desc: "45度斜角停入",
    carStart: { x: 120, y: 450, angle: PI2 }, // facing right
    spot: { cx: 420, cy: 400, w: 95, h: CAR_W+10, angle: PI4, type: 'diagonal' },
    obstacles: [
      { cx: 310, cy: 380, w: CAR_W, h: CAR_H, angle: PI2 + PI4, type: 'car', color: '#00cec9' },
      { cx: 540, cy: 350, w: CAR_W, h: CAR_H, angle: PI2 + PI4, type: 'car', color: '#e17055' },
    ],
    walls: [{ x: 0, y: 520, w: W, h: 80 }],
    targetAngle: PI2 + PI4, // 45 degrees
  },
  {
    // Level 5: 狹窄車位 - tight parallel parking
    name: "狹窄車位",
    desc: "空間很小，慢慢來",
    carStart: { x: 130, y: 430, angle: PI2 },
    spot: { cx: 500, cy: 430, w: 82, h: CAR_W+8, angle: 0, type: 'parallel' },

// ====== INIT ======
function startLevel(idx) {
  currentLevel = idx;
  level = LEVELS[idx];
  running = true; paused = false; frameCount = 0;
  hits = 0; parked = false; parkTimer = 0;
  startTime = Date.now();
  particles = [];

  car = {
    x: level.carStart.x,
    y: level.carStart.y,
    angle: level.carStart.angle,
    speed: 0,
    maxSpeed: 2.2,
    maxReverse: 1.3,
    accel: 0.05,
    decel: 0.04,
    turnSpeed: 0.022,
    width: CAR_W,
    height: CAR_H,
  };

  parkingSpot = level.spot;
  obstacles = level.obstacles.map(o => ({...o}));

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hudLevel').textContent = `🅿️ 關卡 ${idx+1}：${level.name}`;
  document.getElementById('hudHits').textContent = `💥 0`;

  if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
    document.getElementById('mobileControls').style.display = 'flex';
    initSteeringWheel();
  }

  showNotification(`關卡 ${idx+1}：${level.name}\n${level.desc}`);
  lastTime = 0;
  requestAnimationFrame(gameLoop);
}

// ====== INPUT ======
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Escape' || e.key === 'p') togglePause();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ====== GAME LOOP ======
let lastTime = 0;
function gameLoop(time) {
  if (!running) return;
  if (paused) { requestAnimationFrame(gameLoop); return; }
  const dt = Math.min((time - lastTime) / 16.67, 2);
  lastTime = time;
  update(dt);
  render();
  frameCount++;
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  const up = keys['ArrowUp'] || keys['w'] || keys['W'] || mobileUp;
  const down = keys['ArrowDown'] || keys['s'] || keys['S'] || mobileDown;
  const left = keys['ArrowLeft'] || keys['a'] || keys['A'] || mobileLeft;
  const right = keys['ArrowRight'] || keys['d'] || keys['D'] || mobileRight;

  // Acceleration: ↑ = forward (positive speed), ↓ = reverse (negative speed)
  if (up) car.speed = Math.min(car.maxSpeed, car.speed + car.accel * dt);
  else if (down) car.speed = Math.max(-car.maxReverse, car.speed - car.accel * dt);
  else {
    if (car.speed > 0) car.speed = Math.max(0, car.speed - car.decel * dt);
    else if (car.speed < 0) car.speed = Math.min(0, car.speed + car.decel * dt);
  }

  // Steering - only when moving; ← turns left (counterclockwise = angle decreases)
  if (Math.abs(car.speed) > 0.05) {
    const turnFactor = car.speed > 0 ? 1 : -1; // reverse steering when going backward
    if (left) car.angle -= car.turnSpeed * dt * turnFactor;
    if (right) car.angle += car.turnSpeed * dt * turnFactor;
  }

  // Move car using our angle system: angle=0 → up, angle=PI/2 → right
  const dx = Math.sin(car.angle) * car.speed * dt;
  const dy = -Math.cos(car.angle) * car.speed * dt;
  car.x += dx;
  car.y += dy;

  // Boundary
  car.x = Math.max(25, Math.min(W - 25, car.x));
  car.y = Math.max(25, Math.min(H - 25, car.y));

  // Collision with obstacles
  for (const obs of obstacles) {
    if (obs.type === 'cone') {
      const dist = Math.hypot(car.x - obs.cx, car.y - obs.cy);
      if (dist < 28) {
        car.speed *= -0.3;
        car.x -= dx * 1.5; car.y -= dy * 1.5;
        if (frameCount % 20 < 2) { hits++; updateHits(); }
      }
      continue;
    }
    if (checkCarCollision(car, obs)) {
      car.speed *= -0.3;
      car.x -= dx * 1.5; car.y -= dy * 1.5;
      if (frameCount % 20 < 2) {
        hits++; updateHits();
        for (let i = 0; i < 5; i++) {
          particles.push({
            x: car.x + (Math.random()-0.5)*30,
            y: car.y + (Math.random()-0.5)*30,
            vx: (Math.random()-0.5)*3, vy: (Math.random()-0.5)*3,
            life: 20, color: '#e17055',
          });
        }
      }
    }
  }

  // Collision with walls
  for (const wall of level.walls) {
    if (car.x > wall.x - 22 && car.x < wall.x + wall.w + 22 &&
        car.y > wall.y - 30 && car.y < wall.y + wall.h + 30) {
      car.speed *= -0.2;
      car.x -= dx * 2; car.y -= dy * 2;
      if (frameCount % 30 < 2) { hits++; updateHits(); }
    }
  }

  // Check parking
  const inSpot = isInParkingSpot(car, parkingSpot);
  const angleOk = Math.abs(normalizeAngle(car.angle - level.targetAngle)) < 0.3;
  const stopped = Math.abs(car.speed) < 0.1;

  if (inSpot && angleOk && stopped) {
    parkTimer += dt;
    if (parkTimer > 60 && !parked) {
      parked = true;
      finishLevel();
    }
  } else {
    parkTimer = Math.max(0, parkTimer - dt * 0.5);
  }

  // Particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; }

  // HUD
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('hudTimer').textContent = `⏱️ ${elapsed}s`;
}

function updateHits() { document.getElementById('hudHits').textContent = `💥 ${hits}`; }

function finishLevel() {
  running = false;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  let stars = 1;
  if (hits === 0) stars = 3;
  else if (hits <= 2) stars = 2;
  if (elapsed < 30) stars = Math.min(3, stars + 0); // bonus already in perfect

  const starStr = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  document.getElementById('resultTitle').textContent = '🎉 停車成功！';
  document.getElementById('resultTitle').style.color = '#ffeaa7';
  document.getElementById('resultStars').textContent = starStr;
  document.getElementById('resultStats').innerHTML =
    `⏱️ 用時：${elapsed} 秒<br>💥 碰撞：${hits} 次<br>${stars === 3 ? '🏆 完美停車！' : stars === 2 ? '👍 不錯喔！' : '💪 再練習就會更好'}`;
  document.getElementById('resultScreen').style.display = 'flex';
  document.getElementById('nextBtn').style.display = currentLevel < LEVELS.length - 1 ? 'inline-block' : 'none';
}

// ====== COLLISION (OBB - Oriented Bounding Box) ======
function getCorners(obj, w, h, angle) {
  const cos = Math.cos(angle), sin = Math.sin(angle);
  const hw = w/2, hh = h/2;
  return [
    { x: obj.cx + (-hw*cos - -hh*sin), y: obj.cy + (-hw*sin + -hh*cos) },
    { x: obj.cx + ( hw*cos - -hh*sin), y: obj.cy + ( hw*sin + -hh*cos) },
    { x: obj.cx + ( hw*cos -  hh*sin), y: obj.cy + ( hw*sin +  hh*cos) },
    { x: obj.cx + (-hw*cos -  hh*sin), y: obj.cy + (-hw*sin +  hh*cos) },
  ];
}

function checkCarCollision(carObj, obs) {
  // Use simplified circle-based collision with car's center
  const carCx = carObj.x, carCy = carObj.y;
  const obsCx = obs.cx, obsCy = obs.cy;
  const dist = Math.hypot(carCx - obsCx, carCy - obsCy);
  // Car effective radius ~25, obstacle radius based on size
  const carR = 28;
  const obsR = Math.min(obs.w, obs.h) / 2 + 5;
  return dist < carR + obsR;
}

function isInParkingSpot(carObj, spot) {
  const dist = Math.hypot(carObj.x - spot.cx, carObj.y - spot.cy);
  return dist < 30;
}

function normalizeAngle(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

// ====== RENDER ======
function render() {
  // Asphalt ground with radial gradient
  const asphGrad = ctx.createRadialGradient(W/2, H/2, 80, W/2, H/2, 520);
  asphGrad.addColorStop(0, '#4a5560');
  asphGrad.addColorStop(0.5, '#3d4751');
  asphGrad.addColorStop(1, '#2d3436');
  ctx.fillStyle = asphGrad;
  ctx.fillRect(0, 0, W, H);

  // Asphalt fine noise (static seeded)
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  for (let i = 0; i < 350; i++) {
    const nx = (i * 137.508) % W;
    const ny = (i * 97.331) % H;
    ctx.fillRect(nx, ny, 1 + (i % 3), 1 + (i % 3));
  }
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let i = 0; i < 250; i++) {
    const nx = (i * 211.3 + 50) % W;
    const ny = (i * 173.7 + 30) % H;
    ctx.fillRect(nx, ny, 2, 2);
  }

  // Oil stains
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  for (let i = 0; i < 8; i++) {
    const ox = (i * 293.7 + 80) % W;
    const oy = (i * 191.3 + 100) % (H - 100);
    const or = 15 + (i % 4) * 8;
    ctx.beginPath();
    ctx.ellipse(ox, oy, or, or * 0.6, i * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Surface cracks
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const cx0 = (i * 167.3 + 100) % W;
    const cy0 = (i * 131.7 + 200) % (H - 100);
    ctx.beginPath();
    ctx.moveTo(cx0, cy0);
    for (let s = 1; s <= 4; s++) {
      ctx.lineTo(cx0 + Math.sin(i + s) * 25 * s, cy0 + Math.cos(i + s * 0.7) * 18 * s);
    }
    ctx.stroke();
  }

  // Road markings
  drawRoadMarkings();

  // Bottom sidewalk
  ctx.fillStyle = '#8c8c8c';
  ctx.fillRect(0, H - 80, W, 80);
  for (let sx = 0; sx < W; sx += 35) {
    ctx.fillStyle = '#7a7a7a';
    ctx.fillRect(sx + 1, H - 78, 33, 76);
    ctx.fillStyle = 'rgba(0,0,0,0.04)';
    ctx.fillRect(sx + 2, H - 77, 31, 1);
    ctx.fillRect(sx + 2, H - 40, 31, 1);
  }
  // Curb edge (yellow-red)
  for (let cx = 0; cx < W; cx += 30) {
    ctx.fillStyle = (cx / 30) % 2 === 0 ? '#f1c40f' : '#e74c3c';
    ctx.fillRect(cx, H - 80, 30, 5);
  }
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(0, H - 80, W, 3);

  // Top wall (concrete panels)
  if (level.walls.some(w => w.y === 0 && w.h >= 50)) {
    const wallGrad = ctx.createLinearGradient(0, 0, 0, 50);
    wallGrad.addColorStop(0, '#3d4751');
    wallGrad.addColorStop(1, '#576574');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, W, 50);
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1.5;
    for (let bx = 0; bx <= W; bx += 60) {
      ctx.beginPath(); ctx.moveTo(bx, 0); ctx.lineTo(bx, 50); ctx.stroke();
    }
    ctx.beginPath(); ctx.moveTo(0, 25); ctx.lineTo(W, 25); ctx.stroke();
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    for (let i = 0; i < 30; i++) ctx.fillRect((i * 73.3) % W, (i * 41.7) % 45, 3, 3);
  }

  // Side walls (concrete)
  if (level.walls.some(w => w.x === 0 && w.w <= 20)) {
    const wgL = ctx.createLinearGradient(0, 0, 15, 0);
    wgL.addColorStop(0, '#3d4751'); wgL.addColorStop(1, '#576574');
    ctx.fillStyle = wgL;
    ctx.fillRect(0, 0, 15, H);
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
    for (let wy = 0; wy < H; wy += 30) { ctx.beginPath(); ctx.moveTo(0, wy); ctx.lineTo(15, wy); ctx.stroke(); }
  }
  if (level.walls.some(w => w.x === W - 20)) {
    const wgR = ctx.createLinearGradient(W - 15, 0, W, 0);
    wgR.addColorStop(0, '#576574'); wgR.addColorStop(1, '#3d4751');
    ctx.fillStyle = wgR;
    ctx.fillRect(W - 15, 0, 15, H);
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
    for (let wy = 0; wy < H; wy += 30) { ctx.beginPath(); ctx.moveTo(W - 15, wy); ctx.lineTo(W, wy); ctx.stroke(); }
  }

  // Parking spot
  drawParkingSpot(parkingSpot);

  // Obstacles
  for (const obs of obstacles) {
    if (obs.type === 'car') drawCar(obs.cx, obs.cy, obs.w, obs.h, obs.angle, obs.color);
    else if (obs.type === 'cone') drawCone(obs.cx, obs.cy);
  }

  // Particles
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 20;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Player car
  drawCar(car.x, car.y, car.width, car.height, car.angle, '#e84393', true);

  // Parking status
  const inSpot = isInParkingSpot(car, parkingSpot);
  const angleOk = Math.abs(normalizeAngle(car.angle - level.targetAngle)) < 0.3;
  const stopped = Math.abs(car.speed) < 0.1;

  if (inSpot && stopped && angleOk) {
    // Green glow with radial gradient
    const glowGrad = ctx.createRadialGradient(car.x, car.y, 15, car.x, car.y, 55);
    glowGrad.addColorStop(0, 'rgba(0,184,148,0.25)');
    glowGrad.addColorStop(1, 'rgba(0,184,148,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath(); ctx.arc(car.x, car.y, 55, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#00b894'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(car.x, car.y, 45, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#00b894'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
    const holdSec = Math.ceil((60 - parkTimer) / 60);
    ctx.fillText(`✅ 停好了！維持 ${holdSec} 秒`, car.x, car.y - 50);
  } else if (inSpot && stopped) {
    ctx.fillStyle = '#fdcb6e'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('⚠️ 角度不對，微調方向', car.x, car.y - 50);
  } else if (inSpot) {
    ctx.fillStyle = '#fdcb6e'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('⚠️ 車還在動，停穩', car.x, car.y - 50);
  }

  // Speed display
  if (Math.abs(car.speed) > 0.05) {
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'left';
    const spd = Math.round(Math.abs(car.speed) * 15);
    ctx.fillText(car.speed > 0 ? `前進 ${spd}` : `倒車 ${spd}`, 15, H - 90);
  }

  // Direction arrow
  if (Math.abs(car.speed) > 0.1) {
    const arrowLen = 35 * Math.abs(car.speed) / car.maxSpeed;
    const dir = car.speed > 0 ? 1 : -1;
    const ax = car.x + Math.sin(car.angle) * arrowLen * dir;
    const ay = car.y - Math.cos(car.angle) * arrowLen * dir;
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(car.x, car.y); ctx.lineTo(ax, ay); ctx.stroke();
  }
}

// ====== DRAW FUNCTIONS ======
function drawCar(cx, cy, w, h, angle, color, isPlayer) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  // Drop shadow (offset)
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.roundRect(-w/2 + 3, -h/2 + 3, w, h, 7);
  ctx.fill();

  // Body shadow underside
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.roundRect(-w/2, -h/2, w, h, 7);
  ctx.fill();

  // Body with gradient (metallic look)
  const bodyGrad = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  bodyGrad.addColorStop(0, shadeColor(color, -20));
  bodyGrad.addColorStop(0.3, color);
  bodyGrad.addColorStop(0.5, shadeColor(color, 15));
  bodyGrad.addColorStop(0.7, color);
  bodyGrad.addColorStop(1, shadeColor(color, -20));
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(-w/2, -h/2, w, h, 7);
  ctx.fill();

  // Roof / cabin area (slightly different shade)
  if (isPlayer) {
    ctx.fillStyle = shadeColor(color, -10);
    ctx.beginPath();
    ctx.roundRect(-w/2 + 3, -h/2 + h * 0.28, w - 6, h * 0.38, 4);
    ctx.fill();
  }

  // Windshield with gradient (reflective glass)
  const wsGrad = ctx.createLinearGradient(0, -h/2 + 7, 0, -h/2 + 7 + h * 0.22);
  wsGrad.addColorStop(0, 'rgba(150,200,255,0.8)');
  wsGrad.addColorStop(1, 'rgba(80,120,180,0.6)');
  ctx.fillStyle = wsGrad;
  ctx.beginPath();
  ctx.roundRect(-w/2 + 5, -h/2 + 7, w - 10, h * 0.22, 4);
  ctx.fill();

  // Rear window
  const rwGrad = ctx.createLinearGradient(0, h * 0.18, 0, h * 0.18 + h * 0.2);
  rwGrad.addColorStop(0, 'rgba(80,120,180,0.6)');
  rwGrad.addColorStop(1, 'rgba(150,200,255,0.7)');
  ctx.fillStyle = rwGrad;
  ctx.beginPath();
  ctx.roundRect(-w/2 + 5, h * 0.18, w - 10, h * 0.2, 4);
  ctx.fill();

  // Side mirrors
  ctx.fillStyle = shadeColor(color, -25);
  ctx.fillRect(-w/2 - 2, -h/2 + h * 0.15, 4, 5);
  ctx.fillRect(w/2 - 2, -h/2 + h * 0.15, 4, 5);

  // Headlights (front)
  // Light housing
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillRect(-w/2 + 4, -h/2 + 1, w * 0.25, 4);
  ctx.fillRect(w/2 - w * 0.25 - 4, -h/2 + 1, w * 0.25, 4);
  // Light glow
  ctx.fillStyle = '#ffeaa7';
  ctx.beginPath(); ctx.arc(-w/2 + 7, -h/2 + 2, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(w/2 - 7, -h/2 + 2, 3.5, 0, Math.PI * 2); ctx.fill();

  // Taillights (rear)
  ctx.fillStyle = 'rgba(255,50,50,0.9)';
  ctx.beginPath(); ctx.arc(-w/2 + 7, h/2 - 2, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(w/2 - 7, h/2 - 2, 3, 0, Math.PI * 2); ctx.fill();

  // Bumper line
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-w/2 + 2, -h/2 + h * 0.28); ctx.lineTo(w/2 - 2, -h/2 + h * 0.28);
  ctx.moveTo(-w/2 + 2, h/2 - h * 0.22); ctx.lineTo(w/2 - 2, h/2 - h * 0.22);
  ctx.stroke();

  // Wheels
  ctx.fillStyle = '#2d3436';
  const wheelW = 5, wheelH = 12;
  ctx.fillRect(-w/2 - 2, -h/2 + 10, wheelW, wheelH);
  ctx.fillRect(w/2 - 3, -h/2 + 10, wheelW, wheelH);
  ctx.fillRect(-w/2 - 2, h/2 - 22, wheelW, wheelH);
  ctx.fillRect(w/2 - 3, h/2 - 22, wheelW, wheelH);

  // Front direction indicator (only for player)
  if (isPlayer) {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(0, -h/2 - 6);
    ctx.lineTo(-4, -h/2 - 1);
    ctx.lineTo(4, -h/2 - 1);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function drawRoadMarkings() {
  ctx.save();

  if (currentLevel === 10) {
    // S-curve: dashed center line only
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 4;
    ctx.setLineDash([18, 12]);
    ctx.beginPath();
    ctx.moveTo(100, 480);
    ctx.bezierCurveTo(210, 470, 220, 320, 215, 250);
    ctx.bezierCurveTo(210, 180, 350, 230, 470, 220);
    ctx.bezierCurveTo(540, 215, 600, 180, 660, 150);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function drawSuggestedPath(carObj, spot) {
  // Draw a curved dashed line from car to parking spot center
  ctx.save();
  ctx.strokeStyle = 'rgba(255,234,167,0.35)';
  ctx.lineWidth = 4;
  ctx.setLineDash([12, 8]);
  ctx.lineCap = 'round';

  const sx = carObj.x, sy = carObj.y;
  const ex = spot.cx, ey = spot.cy;

  // Control point for a gentle curve
  // Bias the curve based on relative position
  const midX = (sx + ex) / 2;
  const midY = (sy + ey) / 2;
  // Offset control point perpendicular to the line
  const dx = ex - sx, dy = ey - sy;
  const len = Math.hypot(dx, dy) || 1;
  const perpX = -dy / len;
  const perpY = dx / len;
  // Slight curve based on distance
  const curveOffset = Math.min(60, len * 0.15);
  // Curve towards open side (away from nearest obstacle)
  let cpX = midX + perpX * curveOffset;
  let cpY = midY + perpY * curveOffset;

  // For parallel parking, curve down then into the spot
  if (spot.type === 'parallel') {
    // Approach from the side, curve into the spot
    const approachY = Math.max(sy, ey) + 30;
    cpX = midX;
    cpY = approachY;
  } else if (spot.type === 'perpendicular' || spot.type === 'forward') {
    // Approach straight then turn into spot
    cpX = ex;
    cpY = (sy + ey) / 2;
  }

  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.quadraticCurveTo(cpX, cpY, ex, ey);
  ctx.stroke();

  // Draw arrow at the end pointing to spot
  const arrowAngle = Math.atan2(ey - cpY, ex - cpX);
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(255,234,167,0.5)';
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex - 12 * Math.cos(arrowAngle - 0.4), ey - 12 * Math.sin(arrowAngle - 0.4));
  ctx.lineTo(ex - 12 * Math.cos(arrowAngle + 0.4), ey - 12 * Math.sin(arrowAngle + 0.4));
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawParkingSpot(spot) {
  ctx.save();
  ctx.translate(spot.cx, spot.cy);
  ctx.rotate(spot.angle);

  // Spot fill
  ctx.fillStyle = 'rgba(255,234,167,0.12)';
  ctx.fillRect(-spot.w/2, -spot.h/2, spot.w, spot.h);

  // White lines
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.setLineDash([]);

  if (spot.type === 'parallel') {
    // Parallel: open at top (-Y = road side), curb line at bottom (+Y)
    // After rotate(spot.angle), the spot faces the car's direction
    ctx.beginPath();
    // Left side line
    ctx.moveTo(-spot.w/2, -spot.h/2);
    ctx.lineTo(-spot.w/2, spot.h/2);
    // Right side line
    ctx.moveTo(spot.w/2, -spot.h/2);
    ctx.lineTo(spot.w/2, spot.h/2);
    // Bottom line (curb side = +Y in car space = behind car)
    ctx.moveTo(-spot.w/2, spot.h/2);
    ctx.lineTo(spot.w/2, spot.h/2);
    ctx.stroke();
  } else if (spot.type === 'perpendicular') {
    // Reverse-in: U-shape open at bottom (+Y = entrance side)
    // Top line (back of spot) + two side lines
    ctx.beginPath();
    ctx.moveTo(-spot.w/2, -spot.h/2);
    ctx.lineTo(spot.w/2, -spot.h/2);
    ctx.moveTo(-spot.w/2, -spot.h/2);
    ctx.lineTo(-spot.w/2, spot.h/2);
    ctx.moveTo(spot.w/2, -spot.h/2);
    ctx.lineTo(spot.w/2, spot.h/2);
    ctx.stroke();
  } else if (spot.type === 'forward') {
    // Forward-in: same U-shape, open at bottom (+Y)
    ctx.beginPath();
    ctx.moveTo(-spot.w/2, -spot.h/2);
    ctx.lineTo(spot.w/2, -spot.h/2);
    ctx.moveTo(-spot.w/2, -spot.h/2);
    ctx.lineTo(-spot.w/2, spot.h/2);
    ctx.moveTo(spot.w/2, -spot.h/2);
    ctx.lineTo(spot.w/2, spot.h/2);
    ctx.stroke();
  } else if (spot.type === 'diagonal') {
    // Diagonal: U-shape open at bottom-left for angled approach
    ctx.beginPath();
    ctx.moveTo(-spot.w/2, -spot.h/2);
    ctx.lineTo(spot.w/2, -spot.h/2);
    ctx.moveTo(-spot.w/2, -spot.h/2);
    ctx.lineTo(-spot.w/2, spot.h/2);
    ctx.moveTo(spot.w/2, -spot.h/2);
    ctx.lineTo(spot.w/2, spot.h/2);
    ctx.stroke();
  }

  // P label
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('P', 0, 6);

  ctx.restore();
}

// Color helper for metallic shading
function shadeColor(hex, percent) {
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.max(0, Math.min(255, r + Math.round(r * percent / 100)));
  g = Math.max(0, Math.min(255, g + Math.round(g * percent / 100)));
  b = Math.max(0, Math.min(255, b + Math.round(b * percent / 100)));
  return `rgb(${r},${g},${b})`;
}

function drawCone(cx, cy) {
  ctx.save();
  ctx.translate(cx, cy);

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(2, 14, 12, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Base (trapezoid)
  ctx.fillStyle = '#2d3436';
  ctx.beginPath();
  ctx.moveTo(-12, 14);
  ctx.lineTo(12, 14);
  ctx.lineTo(9, 10);
  ctx.lineTo(-9, 10);
  ctx.closePath();
  ctx.fill();

  // Cone body (orange triangle with rounded bottom)
  const coneGrad = ctx.createLinearGradient(0, -15, 0, 10);
  coneGrad.addColorStop(0, '#fdcb6e');
  coneGrad.addColorStop(0.5, '#e17055');
  coneGrad.addColorStop(1, '#d63031');
  ctx.fillStyle = coneGrad;
  ctx.beginPath();
  ctx.moveTo(-9, 10);
  ctx.lineTo(9, 10);
  ctx.lineTo(3, -15);
  ctx.lineTo(-3, -15);
  ctx.closePath();
  ctx.fill();

  // White reflective stripe (upper)
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.moveTo(-5.5, -3);
  ctx.lineTo(5.5, -3);
  ctx.lineTo(4.5, -1);
  ctx.lineTo(-4.5, -1);
  ctx.closePath();
  ctx.fill();

  // White reflective stripe (lower)
  ctx.beginPath();
  ctx.moveTo(-7.5, 4);
  ctx.lineTo(7.5, 4);
  ctx.lineTo(6.5, 6);
  ctx.lineTo(-6.5, 6);
  ctx.closePath();
  ctx.fill();

  // Top highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.moveTo(-3, -15);
  ctx.lineTo(0, -15);
  ctx.lineTo(-2, 8);
  ctx.lineTo(-6, 10);
  ctx.closePath();
  ctx.fill();

  // Black outline
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-9, 10);
  ctx.lineTo(3, -15);
  ctx.lineTo(-3, -15);
  ctx.closePath();
  ctx.stroke();

  ctx.restore();
}

// ====== ACTIONS ======
function togglePause() {
  if (!running) return;
  paused = !paused;
  document.getElementById('pauseOverlay').style.display = paused ? 'flex' : 'none';
}
function resumeGame() { paused = false; document.getElementById('pauseOverlay').style.display = 'none'; }
function quitToMenu() {
  running = false; paused = false;
  document.getElementById('pauseOverlay').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  document.getElementById('mobileControls').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
}
function retryLevel() { startLevel(currentLevel); }
function nextLevel() { if (currentLevel < LEVELS.length - 1) startLevel(currentLevel + 1); }

function showNotification(text) {
  const el = document.getElementById('notification');
  el.textContent = text;
  el.style.display = 'block';
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'fadeInOut 3s ease-in-out forwards';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// Polyfill roundRect
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r, r, r, r];
    const [tl, tr, br, bl] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

document.addEventListener('touchmove', e => { if (running) e.preventDefault(); }, { passive: false });
